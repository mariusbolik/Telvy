# coturn configuration for Telvy
# Install: apt install coturn
# Run: turnserver -c /path/to/coturn.conf

listening-port=3478
tls-listening-port=5349

# Replace with your domain
realm=telvy.ch
server-name=telvy.ch

# Replace with your VPS external IP
# external-ip=YOUR_VPS_IP

# TLS certificates (Let's Encrypt)
# cert=/etc/letsencrypt/live/telvy.ch/fullchain.pem
# pkey=/etc/letsencrypt/live/telvy.ch/privkey.pem

# HMAC-based credentials (time-limited, per-session)
# Must match TURN_SECRET env var in server/index.ts
use-auth-secret
static-auth-secret=telvy-dev-secret

# Security hardening
no-multicast-peers
no-cli
stale-nonce=600
fingerprint

# Block relay to private networks
denied-peer-ip=0.0.0.0-0.255.255.255
denied-peer-ip=10.0.0.0-10.255.255.255
denied-peer-ip=100.64.0.0-100.127.255.255
denied-peer-ip=127.0.0.0-127.255.255.255
denied-peer-ip=169.254.0.0-169.254.255.255
denied-peer-ip=172.16.0.0-172.31.255.255
denied-peer-ip=192.0.0.0-192.0.0.255
denied-peer-ip=192.168.0.0-192.168.255.255
denied-peer-ip=240.0.0.0-255.255.255.255

# No logging for privacy
no-stdout-log
no-syslog
